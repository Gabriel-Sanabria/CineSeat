<app-header activo="cartelera" [emailUsuario]="emailUsuario"></app-header>

<main class="pagina-cartelera">

  <!-- Encabezado -->
  <header class="pagina-cartelera__header">
    <div>
      <h1 class="titulo-display titulo-cartelera">Cartelera</h1>
      <p class="pagina-cartelera__subtitulo">Selecciona una película y elige tu función</p>
    </div>
  </header>

  <!-- Barra de filtros -->
  <app-buscador
    [generos]="generos"
    placeholder="Buscar película..."
    (textoCambia)="textoBusqueda = $event"
    (generoCambia)="filtrarPorGenero($event)"
  ></app-buscador>

  <!-- Grid de películas -->
  <div class="grid-peliculas">
    <app-tarjeta-pelicula
      *ngFor="let pelicula of peliculas"
      [pelicula]="pelicula"
      modo="ver"
      (clickAccion)="verDetalle($event)"
    ></app-tarjeta-pelicula>
  </div>

</main>
