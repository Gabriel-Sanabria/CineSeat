<app-header activo="cartelera" [emailUsuario]="emailUsuario"></app-header>

<div class="pagina-detalle" (click)="deseleccionarFuncion()">

  <!-- Hero con info de la película -->
  <div class="detalle-hero">
    <button class="btn btn-ghost btn-sm btn-volver" (click)="volver()">
      ← Volver a cartelera
    </button>

    <div class="detalle-hero__contenido">
      <!-- Poster -->
      <div class="poster-detalle">
        <app-portada-pelicula
          [titulo]="pelicula?.titulo || ''"
          [genero]="pelicula?.genero || ''"
        ></app-portada-pelicula>
      </div>

      <!-- Info -->
      <div class="detalle-info">
        <div class="detalle-info__badges">
          <span class="badge">{{ pelicula?.genero }}</span>
          <span class="badge">{{ pelicula?.clasificacion }}</span>
        </div>

        <h1 class="detalle-info__titulo titulo-display">{{ pelicula?.titulo }}</h1>

        <p class="detalle-info__meta">
          {{ pelicula?.duracion }} · Dir. {{ pelicula?.director }}
        </p>

        <p class="detalle-info__sinopsis">{{ pelicula?.sinopsis }}</p>
      </div>

      <!-- Panel de funciones -->
      <div class="panel-funciones" (click)="$event.stopPropagation()">
        <h3 class="panel-funciones__titulo titulo-gold">Selecciona función</h3>

        <div class="campo">
          <label class="campo-label">Fecha</label>
          <input
            name="fechaSeleccionada"
            type="date"
            class="campo-input"
            [(ngModel)]="fechaSeleccionada"
          >
        </div>

        <div class="lista-funciones">
          <app-item-funcion
            *ngFor="let funcion of funciones"
            [funcion]="funcion"
            [activo]="funcionSeleccionada?.id === funcion.id"
            (seleccionar)="seleccionarFuncion(funcion)"
          ></app-item-funcion>
        </div>

        <button
          class="btn btn-gold btn-reservar"
          [disabled]="!funcionSeleccionada"
          (click)="irAReserva()"
          type="button"
        >
          <i class="fa-solid fa-couch" style="font-size:16px"></i>
          Reservar asientos
        </button>
      </div>
    </div>
  </div>

</div>
