<main class="pagina-login">

  <!-- Gradiente decorativo superior -->
  <div class="pagina-login__gradiente"></div>

  <!-- Línea dorada superior -->
  <div class="pagina-login__linea-top"></div>

  <!-- Card central -->
  <div class="card-login">

    <!-- Encabezado -->
    <div class="card-login__header">
      <img src="/logo.svg" class="card-login__icono" alt="CineSeat">
      <h1 class="card-login__titulo">CineSeat</h1>
    </div>

    <!-- Tabs -->
    <div class="card-login__tabs">
      <button
        class="card-login__tab"
        [class.card-login__tab--activo]="tabActiva === 'login'"
        (click)="cambiarTab('login')"
        type="button"
      >Iniciar sesión</button>
      <button
        class="card-login__tab"
        [class.card-login__tab--activo]="tabActiva === 'registro'"
        (click)="cambiarTab('registro')"
        type="button"
      >Registro</button>
    </div>

    <!-- Formulario de inicio de sesión -->
    <form *ngIf="tabActiva === 'login'" class="card-login__form" (ngSubmit)="iniciarSesion()" #formLogin="ngForm" novalidate>
      <div class="campo">
        <label class="campo-label" for="correo-login">Correo electrónico</label>
        <input
          id="correo-login"
          name="correoLogin"
          type="email"
          class="campo-input"
          placeholder="usuario@email.com"
          [(ngModel)]="correoLogin"
          required
          #correoLoginCtrl="ngModel"
        >
        <span class="campo-error" *ngIf="correoLoginCtrl.invalid && correoLoginCtrl.touched">
          Correo requerido
        </span>
      </div>

      <div class="campo">
        <label class="campo-label" for="contrasena-login">Contraseña</label>
        <div class="campo-contrasena">
          <input
            id="contrasena-login"
            name="contrasenaLogin"
            [type]="mostrarContrasenaLogin ? 'text' : 'password'"
            class="campo-input"
            placeholder="••••••••"
            [(ngModel)]="contrasenaLogin"
            required
            #contrasenaLoginCtrl="ngModel"
          >
          <button
            type="button"
            class="btn-ojo"
            (click)="mostrarContrasenaLogin = !mostrarContrasenaLogin"
            [attr.aria-label]="mostrarContrasenaLogin ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <i class="fa-solid" [class.fa-eye]="!mostrarContrasenaLogin" [class.fa-eye-slash]="mostrarContrasenaLogin"></i>
          </button>
        </div>
        <span class="campo-error" *ngIf="contrasenaLoginCtrl.invalid && contrasenaLoginCtrl.touched">
          Contraseña requerida
        </span>
      </div>

      <div class="campo-sesion-mantenida">
        <input type="checkbox" id="sesion-mantenida" name="sesionMantenida" [(ngModel)]="sesionMantenida">
        <label class="campo-sesion-mantenida__etiqueta" for="sesion-mantenida">Mantener sesión iniciada</label>
      </div>

      <button type="submit" class="btn btn-gold btn-login" [disabled]="cargando">
        <i *ngIf="cargando" class="fa-solid fa-circle-notch btn-spinner"></i>
        <span>{{ cargando ? 'Cargando...' : 'Entrar' }}</span>
      </button>
    </form>

    <!-- Formulario de registro -->
    <form *ngIf="tabActiva === 'registro'" class="card-login__form" (ngSubmit)="registrar()" #formRegistro="ngForm" novalidate>
      <div class="campo">
        <label class="campo-label" for="correo-registro">Correo electrónico</label>
        <input
          id="correo-registro"
          name="correoRegistro"
          type="email"
          class="campo-input"
          placeholder="usuario@email.com"
          [(ngModel)]="correoRegistro"
          required
          #correoRegistroCtrl="ngModel"
        >
        <span class="campo-error" *ngIf="correoRegistroCtrl.invalid && correoRegistroCtrl.touched">
          Correo requerido
        </span>
      </div>

      <div class="campo">
        <label class="campo-label" for="contrasena-registro">Contraseña</label>
        <div class="campo-contrasena">
          <input
            id="contrasena-registro"
            name="contrasenaRegistro"
            [type]="mostrarContrasenaRegistro ? 'text' : 'password'"
            class="campo-input"
            placeholder="••••••••"
            [(ngModel)]="contrasenaRegistro"
            required
            #contrasenaRegistroCtrl="ngModel"
          >
          <button
            type="button"
            class="btn-ojo"
            (click)="mostrarContrasenaRegistro = !mostrarContrasenaRegistro"
            [attr.aria-label]="mostrarContrasenaRegistro ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <i class="fa-solid" [class.fa-eye]="!mostrarContrasenaRegistro" [class.fa-eye-slash]="mostrarContrasenaRegistro"></i>
          </button>
        </div>
        <span class="campo-error" *ngIf="contrasenaRegistroCtrl.invalid && contrasenaRegistroCtrl.touched">
          Contraseña requerida
        </span>
      </div>

      <button type="submit" class="btn btn-gold btn-login" [disabled]="cargando">
        <i *ngIf="cargando" class="fa-solid fa-circle-notch btn-spinner"></i>
        <span>{{ cargando ? 'Cargando...' : 'Crear cuenta' }}</span>
      </button>
    </form>

  </div>
</main>
