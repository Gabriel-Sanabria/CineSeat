<app-header activo="peliculas" [emailUsuario]="emailUsuario"></app-header>

<main class="pagina-peliculas">

  <!-- Encabezado -->
  <header class="pagina-peliculas__header">
    <div>
      <h1 class="titulo-display titulo-peliculas">Películas</h1>
      <p class="pagina-peliculas__subtitulo">Administra el catálogo de películas</p>
    </div>
    <button class="btn btn-gold btn-md" (click)="nuevaPelicula()" type="button">
      <i class="fa-solid fa-plus icono-md"></i>
      Nueva película
    </button>
  </header>

  <!-- Barra de filtros -->
  <div class="barra-filtros">
    <div class="campo-busqueda">
      <i class="fa-solid fa-magnifying-glass campo-busqueda__icono icono-lg"></i>
      <input
        name="busqueda"
        type="text"
        class="campo-busqueda__input"
        placeholder="Buscar película..."
        [(ngModel)]="textoBusqueda"
      >
    </div>

    <ul class="chips-genero">
      <li *ngFor="let genero of generos">
        <button
          class="chip-genero"
          [class.chip-genero--activo]="generoSeleccionado === genero"
          (click)="filtrarPorGenero(genero)"
          type="button"
        >{{ genero }}</button>
      </li>
    </ul>
  </div>

  <!-- Grid de películas -->
  <div class="grid-peliculas">
    <app-tarjeta-pelicula
      *ngFor="let pelicula of peliculas"
      [pelicula]="pelicula"
      modo="editar"
      (clickAccion)="editarPelicula($event)"
    ></app-tarjeta-pelicula>
  </div>

  <!-- Estado vacío -->
  <div class="estado-vacio" *ngIf="peliculas.length === 0">
    <i class="fa-solid fa-film estado-vacio__icono icono-3xl"></i>
    <p class="estado-vacio__texto">No hay películas en el catálogo.</p>
    <button class="btn btn-gold btn-md" (click)="nuevaPelicula()" type="button">
      Agregar primera película
    </button>
  </div>

</main>
